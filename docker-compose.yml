services:
  gateway:
    container_name: kiro-gateway
    build: .
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file: .env
    environment:
      DATABASE_PATH: /app/data/gateway.db
    volumes:
      - ./data:/app/data
      - ${KIRO_CREDS_FILE:-~/.aws/sso/cache/kiro-auth-token.json}:/app/data/kiro-auth-token.json:ro
    restart: unless-stopped
